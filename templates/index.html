<!DOCTYPE html>
<html>
<head>
    <title>K-Means Kendaraan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #1e3c72, #2a5298);">

<div class="container py-5">

    <div class="text-center text-white mb-4">
        <h3 class="fw-bold">🚗 Clustering Kendaraan</h3>
        <p class="small">K-Means Jawa Barat</p>
    </div>

    <div class="card shadow p-4">
        <form method="POST" enctype="multipart/form-data">

            <label class="mb-1">Upload CSV</label>
            <input type="file" name="file" class="form-control mb-3" required>

            <label class="mb-1">Jumlah Cluster</label>
            <input type="number" name="k" class="form-control mb-3" value="3">

            <button class="btn btn-success w-100">🚀 Proses</button>

        </form>
    </div>

</div>

</body>
</html>
